<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./js-files/classNames.js" defer></script>
    <script type="module" src="./js-files/exitContainer.js" defer></script>
    <script type="module" src="./js-files/ingredients.js" defer></script>
    <script type="module" src="./js-files/randomRecipes.js" defer></script>
    <script type="module" src="./js-files/script.js" defer></script>
    <title>Random Recipe Finder</title>
  </head>
  <body>
    <div class="recipe__finder">
      <h1 class="recipe__title-name">Find a Recipe</h1>
      <p class="recipe__text">Search for a recipe or find a random one!</p>
      <div class="recipe__search">
        <input class="recipe__search-box" type="text" placeholder="Search a recipe..."/>
        <button class="recipe__search-btn">Search</button>
      </div>
      <div class="recipe__random">
        <button class="recipe__random-btn">Find a random recipe</button>
      </div>
      <div class="recipe__container"></div>
    </div>

    <div class="ingredients__container hidden">
      <div class="ingredients__list">
        <button class="ingredients__exit-btn"><i class="fa-solid fa-x"></i></button>
        <div class="ingredients__details">
          <h2></h2>
          <img src="" alt="Recipe">
          <h3></h3>
          <h3></h3>
          <h3></h3>
          <ul></ul>
          <h3>Instructions:</h3>
          <p></p>
        </div>
      </div>
    </div>

    
  </body>
</html>
